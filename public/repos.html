<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Acrylic Style</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1F2A39" />
    <meta name="description" content="Acrylic Style's Website" />
    <link rel="stylesheet" href="css/font.css" type="text/css">
    <link rel="stylesheet" href="css/main.css" type="text/css">
    <link rel="icon" href="/images/large_bread.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10" async="true"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core" async="true"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/prefetch" async="true"></script>
    <script type="text/javascript" src="js/anime.min.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="js/barba.js" async="true"></script>
    <script crossorigin="anonymous" src="https://polyfill.io/v3/polyfill.min.js?features=default%2CArray.prototype.find%2CIntersectionObserver"></script>
  </head>
  <body data-barba="wrapper">
    <main data-barba="container" data-barba-namespace="repos">
      <style type="text/css">
        .repo:focus, .repo:hover {
          /*z-index: 1337;*/
          border-color: #7700ff;
          box-shadow: 0 0 30px 0 rgba(119, 0, 255, 0.4);
        }

        .repo {
          filter: opacity(0.95);
        }
  
        .repo:focus .name, .repo:hover .name {
          color: #fff;
          text-decoration: underline;
        }
        
        .repo-gray {
          filter: grayscale(1) opacity(0.75);
        }
  
        .repo-gray:focus, .repo-gray:hover {
          filter: opacity(0.8);
        }

        .repo .details {
          margin: 0;
          display: flex;
          justify-content: space-between;
        }
  
        .repo .details .name {
          margin: 0;
          display: block;
          font-weight: 800;
        }

        .repo .details .menu {
          color: #4aaaaa;
          font-weight: 1000;
          font-size: 24px;
          margin-top: -10px;
        }
  
        .repo .description {
          flex: 1 1 auto;
        }
  
        .repo .info {
          margin: 0;
          display: flex;
          justify-content: space-between;
        }
  
        .repo .info .lang {
          color: #4aa12a;
        }

        .repo .info .issues {
          color: #12cf4f;
        }

        .repo .info .issues .material-icons {
          vertical-align: 0px;
        }

        .repo .info .commits {
          color: #12ff4f;
        }

        .repo .info .commits .material-icons {
          vertical-align: 0px;
        }

        .repo .info .stars {
          color: #ffdf11;
        }
  
        .repo .info .activity {
          color: #ffbb00;
        }

        .repo .info .stars::before {
          content: "★";
        }
  
        .repo .info .activity::before {
          content: "🔥";
        }
  
        body {
          max-width: 68em;
          margin: 0 auto;
          padding: 2em;
          overflow-x: hidden;
          color: rgba(255, 255, 255, 0.9);
          background: url('https://next.acrylicstyle.xyz/images/background/night_moon.webp');
          background-attachment: fixed;
          background-repeat: no-repeat;
          background-position-x: center;
          -o-background-position-x: center;
          -moz-background-position-x: center;
          background-size: cover;
          -o-background-size: cover;
          -moz-background-size: cover;
          -webkit-background-size: cover;
        }
  
        a {
          color: #5d91df;
        }

        p {
          display: block;
          margin-block-start: 1em;
          margin-block-end: 1em;
          margin-inline-start: 0px;
          margin-inline-end: 0px;
          font-size: 90%;
        }

        .toggle-closed::before {
          content: '▶ '
        }

        .toggle-opened::before {
          content: '▼ '
        }

        .box {
          border: 2px solid rgba(16, 16, 16, 0.9);
          background-color: rgba(32, 32, 32, 0.9);
        }

        .hidden {
          display: none;
        }

        .pointer {
          cursor: pointer;
        }

        .repo {
          background-color: #282828;
          border: 1px solid #111111;
          padding: 1em;
          width: 16em;
          display: flex;
          flex-direction: column;
          flex-grow: 1;
          text-decoration: none;
          outline: none;
        }

        .repo-wrapper {
          margin-top: 1em;
          display: flex;
          flex-wrap: wrap;
        }

        .cmenu {
          position: absolute;
          border: 2px solid rgba(16, 16, 16, 0.95);
          background-color: rgba(32, 32, 32, 0.92);
          width: 240px;
        }

        .cmenu-entry {
          background-color: rgba(32, 32, 32, 0.9);
          display: flex;
          padding-left: 5px;
          text-align: left;
          cursor: pointer;
          font-size: 18px;
        }

        .cmenu-entry:hover {
          background-color: rgba(119, 0, 255, 0.8);
          display: flex;
          padding-left: 5px;
          text-align: left;
          cursor: pointer;
        }
      </style>
      <script src="js/snowstorm-min.js" type="text/javascript" async="true"></script>
      <div class="light-font" id="main">
        <div>
          <a href="index.html" style="text-decoration: none; display: block; margin-bottom: 1em;">Go Back</a>
          <div>
            <p id="load">Loading... (0 repos loaded)</p>
            <label><input type="checkbox" id="hideArchived" onclick='refreshRepoList()' checked>Hide Archived</input></label><br />
            <a onclick="toggleSortBox()" class="pointer toggle-closed" id="sortToggle">Sort by</a>
            <div id="sortBox" class="box hidden">
              <label><input type="radio" name="sort" value="name_a-z" onchange="refreshRepoList()" checked>Name (A-Z)</input></label><br />
              <label><input type="radio" name="sort" value="name_z-a" onchange="refreshRepoList()">Name (Z-A)</input></label><br />
              <label><input type="radio" name="sort" value="high_activity" onchange="refreshRepoList()">🔥↑</input></label><br />
              <label><input type="radio" name="sort" value="low_activity" onchange="refreshRepoList()">🔥↓</input></label><br />
              <label><input type="radio" name="sort" value="new_update" onchange="refreshRepoList()">Newest (Update)</input></label><br />
              <label><input type="radio" name="sort" value="old_update" onchange="refreshRepoList()">Oldest (Update)</input></label><br />
              <label><input type="radio" name="sort" value="new_create" onchange="refreshRepoList()">Newest (Create)</input></label><br />
              <label><input type="radio" name="sort" value="old_create" onchange="refreshRepoList()">Oldest (Create)</input></label><br />
            </div>
          </div>
        </div>
        <div class="repo-wrapper" id="repos" onload='refetchRepos()'>
        </div>
      </div>
      <script type="text/javascript" src="js/repos.js"></script>
      <script type="text/javascript" src="js/main.js" async="true"></script>
      <script type="text/javascript">
        refetchRepos()
        setTimeout(() => {
          snowStorm.stop();
          console.log('Stopped snowstorm')
        }, 1000)
      </script>
      <p><a href="https://twitter.com/PerfectBoatJP">@PerfectBoatJP</a> <i style="vertical-align: -6px; color: #cf12ff;" class="love material-icons">favorite</i> <a href="https://twitter.com/Liaco_co">@Liaco_co</a></p>
    </main>
  </body>
</html>
