<!DOCTYPE html>
<html lang="en">
  <head>
    <title>ezpp! changelog</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1F2A39" />
    <meta name="description" content="ezpp! changelog" />
    <link rel="icon" href="/images/large_bread.png" type="image/png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <style type="text/css">
        *, ::after, ::before {
          box-sizing: border-box;
        }

        a:active, a:hover, a:link, a:visited {
          outline-style: none;
        }

        a {
          color: rgba(220, 182, 255, 0.8);
          text-decoration: none;
          outline-style: none;
          transition: color 80ms linear;
        }
        
        a:hover,
        a:active {
          color: rgba(255, 255, 255, 0.92);
        }
        
        a:hover {
          cursor: pointer;
        }

        body {
          overflow-x: hidden;
          overflow-y: scroll;
          color: rgba(255, 255, 255, 0.9);
          background-color: #18171C;
          font-family: Torus,Inter,"Helvetica Neue",Tahoma,Arial,"Hiragino Kaku Gothic ProN",Meiryo,"Microsoft YaHei","Apple SD Gothic Neo",sans-serif;
          font-weight: 500;
        }

        div {
          display: block;
        }
        
        .changelog-entries-category {
          font-size: 18px;
          font-weight: 700;
          padding: 35px 0 15px;
        }

        .changelog-entry {
          display: flex;
          font-size: 16px;
          padding: 5px 0;
          flex-direction: column;
        }

        .changelog-entry-title-icon {
          position: absolute;
          margin-left: -1em;
        }

        .changelog-entry-icon {
          opacity: .5;
          font-size: .8em;
          flex: none;
          display: inline-block;
          line-height: 1;
        }

        .changelog-entry-user {
          font-size: 12px;
          padding-left: 8px;
        }
        
        @media (min-width: 370px) {
          .builds {
            display: flex;
            align-self: center;
            margin-left: auto;
            margin-right: auto;
            flex: none;
            width: calc(100% - 40px);
            max-width: 1000px;
            background-color: #302E38;
          }

          .builds-group {
            width: 100%;
            padding-left: 70px;
            padding-right: 70px;
          }

          .groups {
            display: flex;
            align-self: center;
            margin-left: auto;
            margin-right: auto;
            flex: none;
            width: calc(100% - 40px);
            max-width: 1000px;
          }
        }

        .groups {
          padding: 20px 5px;
          background-color: #24222A;
        }

        .groups-container {
          display: flex;
          flex-wrap: wrap;
          padding-left: 45px;
          padding-right: 45px;
          width: 100%;
        }

        .groups-item {
          text-decoration: none;
          color: #fff;
          padding: 5px;
          width: 100px;
          display: block;
          will-change: opacity;
        }

        .groups-featured {
          width: 150px;
        }

        .groups-bar {
          display: block;
          margin-bottom: 5px;
          width: 100%;
          height: 4px;
          border-radius: 400px;
          will-change: transform;
        }

        .groups-row, .groups-item:hover .groups-row {
          opacity: 1;
        }

        .groups-row, .groups-container:hover .groups-row {
          opacity: 0.5;
        }

        .groups-bar, .groups-container:hover .groups-bar {
          transform: scaleY(.5);
          opacity: .5;
        }

        .groups-container:hover .groups-row {
          opacity: .5;
        }

        .groups-container:hover .groups-item-active .groups-bar, .groups-item-active .groups-bar, .groups-item:hover .groups-bar {
          transform: scaleY(1);
          opacity: 1;
        }

        .groups-item-active .groups-row {
          opacity: 1;
        }
        
        .groups-container:hover .groups-item:hover .groups-row {
          opacity: 1;
        }

        .groups-row {
          margin: 0;
        }

        .groups-row-name {
          font-size: 12px;
          font-weight: 700;
        }

        .groups-row-version {
          font-size: 16px;
          font-weight: 300;
        }

        .build-version {
          font-weight: 300;
          padding: 20px 0 0;
          display: flex;
          justify-content: center;
          font-size: 24px;
        }

        .build-date {
          font-size: 14px;
          font-weight: 300;
          color: rgba(220, 182, 255, 0.8);
          text-align: center;
          padding-top: 5px;
        }

        .build-version-link {
          text-decoration: none;
          color: #fff;
          padding: 0 10px;
          margin: 0 10px;
          display: inline-block;
          text-align: center;
        }

        .build-version-current {
          font-weight: 500;
          color: #2ea;
        }

        .half-transparent {
          opacity: .5;
        }

        .page-nav {
          display: flex;
          justify-content: center;
          flex-wrap: wrap;
        }

        .builds-item {
          padding: 0 0 30px;
        }

        .nav-item {
          flex: 1;
          display: flex;
          align-items: center;
          padding: 20px 10px;
        }

        .nav-item-left {
          justify-content: flex-end;
        }

        .nav-item-label {
          padding: 0 10px;
        }

        .changelog-entry-row {
          word-wrap: break-word;
        }

        .fas {
          width: 1em;
          overflow: visible;
          height: 1em;
          display: inline-block;
          vertical-align: -.125em;
        }

        .changelog-entry-major {
          color: #fc2;
        }

        .changelog-entry-row-message {
          margin-top: 2px;
        }

        .changelog-entry-descriptions {
          line-height: 1.35;
          font-size: 12px;
          color: rgba(220, 182, 255, 0.6);
        }

        p {
          display: block;
          margin-block-start: 1em;
          margin-block-end: 1em;
          margin-inline-start: 0px;
          margin-inline-end: 0px;
          margin: 0 0 10px;
        }
      </style>
      <div class="groups">
        <div class="groups-container" id="groups-container">
        </div>
      </div>
      <div class="builds">
        <div class="builds-group">
          <div class="builds-item" id="builds-item">
            <div class="build-version" id="build-version">
              <a class="build-version-link" href="#">
                <i class="fas fa-chevron-left"></i>
              </a>
              <a class="build-version-link" href="" id="build-current-version-link">
                <span>ezpp!</span>
                <span class="build-version-current" id="build-current-version-label"></span>
              </a>
              <span class="build-version-link half-transparent">
                <i class="fas fa-chevron-right"></i>
              </span>
            </div>
            <div class="build-date" id="build-date"></div>
          </div>
          <div class="page-nav" id="page-nav">
            <div class="nav-item nav-item-left" id="nav-item-left"></div>
            <div class="nav-item nav-item-right" id="nav-item-right"></div>
          </div>
          <p style="font-size: 15px">SVG icons provided by Font Awesome. <a href="https://fontawesome.com/license">Licence</a></p>
        </div>
      </div>
    </main>
    <div style="display: none">
      <svg id="fa-plus" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="plus" class="fas svg-inline--fa fa-plus fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="currentColor" d="M416 208H272V64c0-17.67-14.33-32-32-32h-32c-17.67 0-32 14.33-32 32v144H32c-17.67 0-32 14.33-32 32v32c0 17.67 14.33 32 32 32h144v144c0 17.67 14.33 32 32 32h32c17.67 0 32-14.33 32-32V304h144c17.67 0 32-14.33 32-32v-32c0-17.67-14.33-32-32-32z"></path></svg>
      <svg id="fa-minus" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="minus" class="fas svg-inline--fa fa-minus fa-w-14" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="currentColor" d="M416 208H32c-17.67 0-32 14.33-32 32v32c0 17.67 14.33 32 32 32h384c17.67 0 32-14.33 32-32v-32c0-17.67-14.33-32-32-32z"></path></svg>
      <svg id="fa-check" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="check" class="fas svg-inline--fa fa-check fa-w-16" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M173.898 439.404l-166.4-166.4c-9.997-9.997-9.997-26.206 0-36.204l36.203-36.204c9.997-9.998 26.207-9.998 36.204 0L192 312.69 432.095 72.596c9.997-9.997 26.207-9.997 36.204 0l36.203 36.204c9.997 9.997 9.997 26.206 0 36.204l-294.4 294.401c-9.998 9.997-26.207 9.997-36.204-.001z"></path></svg>
      <svg id="fa-chevron-right" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chevron-right" class="fas svg-inline--fa fa-chevron-right fa-w-10" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><path fill="currentColor" d="M285.476 272.971L91.132 467.314c-9.373 9.373-24.569 9.373-33.941 0l-22.667-22.667c-9.357-9.357-9.375-24.522-.04-33.901L188.505 256 34.484 101.255c-9.335-9.379-9.317-24.544.04-33.901l22.667-22.667c9.373-9.373 24.569-9.373 33.941 0L285.475 239.03c9.373 9.372 9.373 24.568.001 33.941z"></path></svg>
      <svg id="fa-chevron-left" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="chevron-left" class="fas svg-inline--fa fa-chevron-left fa-w-10" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><path fill="currentColor" d="M34.52 239.03L228.87 44.69c9.37-9.37 24.57-9.37 33.94 0l22.67 22.67c9.36 9.36 9.37 24.52.04 33.9L131.49 256l154.02 154.75c9.34 9.38 9.32 24.54-.04 33.9l-22.67 22.67c-9.37 9.37-24.57 9.37-33.94 0L34.52 272.97c-9.37-9.37-9.37-24.57 0-33.94z"></path></svg>
    </div>
    <script type="text/javascript" src="js/ezpp.js"></script>
  </body>
</html>
